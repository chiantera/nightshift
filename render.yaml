services:
  - type: web
    name: schedapro
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    plan: free
    envVars:
      - key: DEEPSEEK_API_KEY
        sync: false
      - key: DEEPSEEK_DEFAULT_MODEL
        value: deepseek-chat
      - key: DEEPSEEK_PRO_MODEL
        value: deepseek-chat
      - key: MISTRAL_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: ALLOWED_ORIGINS
        value: https://schedapro-838.netlify.app
      - key: PYTHON_VERSION
        value: "3.11"
